<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Earn Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

header{
    padding:20px;
    text-align:center;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

header h1{
    font-size:35px;
}

.container{
    padding:20px;
}

.balance-box{
    background:linear-gradient(135deg,#1e293b,#334155);
    border-radius:25px;
    padding:30px;
    text-align:center;
    margin-top:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
}

.balance{
    font-size:45px;
    margin-top:10px;
    color:#00ffcc;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px #00c6ff;
}

.card h2{
    margin-bottom:10px;
    color:#00c6ff;
}

.btn{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.task-box{
    margin-top:40px;
    background:#1e293b;
    border-radius:20px;
    padding:25px;
}

.task{
    background:#334155;
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    color:#94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>💸 Money Earning App</h1>
    <p>Earn Daily Rewards Online</p>
</header>

<div class="container">

    <div class="balance-box">
        <h2>Your Balance</h2>
        <div class="balance" id="balance">$0.00</div>
        <button class="btn" onclick="withdraw()">Withdraw</button>
    </div>

    <div class="cards">

        <div class="card">
            <h2>🎥 Watch Ads</h2>
            <p>Earn money by watching videos</p>
            <button class="btn" onclick="earn(5)">Earn $5</button>
        </div>

        <div class="card">
            <h2>🎮 Play Games</h2>
            <p>Complete game tasks</p>
            <button class="btn" onclick="earn(10)">Earn $10</button>
        </div>

        <div class="card">
            <h2>📲 Invite Friends</h2>
            <p>Get referral rewards</p>
            <button class="btn" onclick="earn(20)">Earn $20</button>
        </div>

    </div>

    <div class="task-box">
        <h2>🔥 Daily Tasks</h2>

        <div class="task">
            <span>Login Daily</span>
            <button class="btn" onclick="earn(2)">+$2</button>
        </div>

        <div class="task">
            <span>Watch 3 Videos</span>
            <button class="btn" onclick="earn(3)">+$3</button>
        </div>

        <div class="task">
            <span>Complete Survey</span>
            <button class="btn" onclick="earn(7)">+$7</button>
        </div>

    </div>

</div>

<footer>
    Made with ❤️ | Smart Earning Dashboard
</footer>

<script>
let balance = 0;

function earn(amount){
    balance += amount;

    document.getElementById("balance").innerText =
        "$" + balance.toFixed(2);

    alert("You earned $" + amount);
}

function withdraw(){

    if(balance < 50){
        alert("Minimum withdraw is $50");
    }else{
        alert("Withdraw Request Sent!");
    }

}
</script>

</body>
</html>
